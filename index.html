<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pure Financial Advisors — PQ Discovery Intake</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">Pure Financial Advisors</div>
      <div class="topbar-actions">
        <button type="button" id="presentation-mode-btn" class="btn btn-ghost">Presentation Mode</button>
        <button type="button" id="open-console-btn" class="btn btn-ghost">Data Console</button>
        <button type="button" id="reset-demo-btn" class="btn btn-ghost btn-ghost-danger">Reset Data</button>
        <div class="user-pill">John Smith <span>| Advisor</span></div>
      </div>
    </header>

    <main class="content">
      <!-- ========== PQ DISCOVERY INTAKE ========== -->
      <section id="screen-pq" class="screen is-active">
        <section class="page-title">
          <h1>PQ Discovery Intake</h1>
          <p>Capture discovery information and known facts</p>
        </section>
        <form id="pq-form" autocomplete="off">
          <div class="pq-layout">
            <aside id="pq-notes-panel" class="pq-notes-panel"></aside>
            <div id="pq-form-sections" class="form-col"></div>
            <aside id="pq-dashboard" class="pq-dashboard"></aside>
          </div>
          <footer class="actions">
            <button type="button" id="pq-reset-btn" class="btn btn-light">Clear Form</button>
            <button type="submit" id="pq-save-btn" class="btn btn-primary">Save</button>
          </footer>
        </form>
      </section>
    </main>
  </div>

  <!-- ========== PRESENTATION MODE ========== -->
  <section id="screen-presentation" class="screen">
    <div class="pres-nav no-print">
      <div class="pres-nav-brand">Pure Financial Advisors</div>
      <div class="pres-nav-actions">
        <button type="button" id="pres-edit-btn" class="btn btn-light">← Edit</button>
        <button type="button" id="pres-print-btn" class="btn btn-primary">Print / Save PDF</button>
      </div>
    </div>
    <div id="pres-content" class="pres-content"></div>
  </section>

  <!-- Data Console Overlay -->
  <aside id="data-console" class="data-console" aria-hidden="true">
    <header class="data-console-header">
      <h2>Data Console</h2>
      <button type="button" id="close-console-btn" class="btn btn-light">Close</button>
    </header>
    <p class="section-note">Central data store (read-only debug view)</p>
    <pre id="console-json">{}</pre>
  </aside>

  <script src="./app.js"></script>
</body>
</html>
